<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب جديد - مدرسة علمني</title>
  </head>

  <body class="auth-page">
    <main class="container py-5">
      <section class="auth-box mx-auto bg-white p-4 rounded border">
        <h1 class="h3 text-center mb-4">إنشاء حساب جديد</h1>

        <form id="registerForm" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label">الاسم</label>
            <input
              type="text"
              id="name"
              class="form-control"
              placeholder="أدخل اسمك"
            />
            <div class="error-message text-danger small mt-1"></div>
          </div>

          <div class="mb-3">
            <label for="birthDate" class="form-label">تاريخ الميلاد</label>
            <input type="date" id="birthDate" class="form-control" />
            <div class="error-message text-danger small mt-1"></div>
          </div>

          <div class="mb-3">
            <label for="registerEmail" class="form-label"
              >البريد الإلكتروني</label
            >
            <input
              type="email"
              id="registerEmail"
              class="form-control"
              placeholder="example@email.com"
              dir="ltr"
            />
            <div class="error-message text-danger small mt-1"></div>
          </div>

          <div class="mb-3">
            <label for="registerPassword" class="form-label">كلمة المرور</label>
            <input
              type="password"
              id="registerPassword"
              class="form-control"
              placeholder="أدخل كلمة المرور"
            />
            <div class="error-message text-danger small mt-1"></div>
          </div>

          <div class="mb-3">
            <label for="confirmPassword" class="form-label"
              >تأكيد كلمة المرور</label
            >
            <input
              type="password"
              id="confirmPassword"
              class="form-control"
              placeholder="أعد إدخال كلمة المرور"
            />
            <div class="error-message text-danger small mt-1"></div>
          </div>

          <button type="submit" class="btn btn-warning w-100 mb-3">
            إنشاء حساب جديد
          </button>

          <p class="text-center mb-0">
            هل لديك حساب؟
            <a href="login.html" class="text-warning fw-bold"> تسجيل الدخول </a>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
